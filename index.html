<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji AI Runner - Versión Original</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0f; font-family: system-ui, -apple-system, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: #0a0a0f; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 200px; height: 150px; border: 2px solid #444; border-radius: 10px; overflow: hidden; transform: scaleX(-1); z-index: 500; background: #000; }
        #video-preview { width: 100%; height: 100%; object-fit: cover; display: block; }
        #skeleton-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: transparent; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; display: none; }
        .stat-card { background: rgba(20, 20, 30, 0.85); padding: 15px 25px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #333; color: white; backdrop-filter: blur(5px); }
        #loading { position: fixed; inset: 0; background: #0a0a0f; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        #game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: white; text-align: center; }
        
        #start-screen { position: fixed; inset: 0; background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; text-align: center; padding: 20px; color: white; }
        #countdown-screen { position: fixed; inset: 0; background: rgba(10,10,15,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 400; color: white; }
        .btn-start { background: white; color: black; padding: 1.5rem 3rem; border-radius: 99px; font-weight: 800; font-size: 1.5rem; transition: all 0.3s; margin-top: 2rem; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,255,255,0.2); }

        /* Nivel Anuncio */
        #level-announcement { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; z-index: 600; display: none; pointer-events: none; }
        .lvl-text { font-size: 5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px rgba(255,255,255,0.5); margin: 0; }
        .lvl-name { font-size: 2rem; color: #fbbf24; font-weight: 700; margin-top: -10px; }

        /* Progreso y Vidas */
        #progress-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 300px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); z-index: 1000; }
        #progress-bar { width: 0%; height: 100%; background: #4ade80; transition: width 0.3s; box-shadow: 0 0 10px #4ade80; }
        #lives-container { position: fixed; top: 20px; right: 240px; display: flex; gap: 8px; z-index: 1000; font-size: 1.8rem; }
        .heart { filter: drop-shadow(0 0 5px rgba(255,0,0,0.5)); }
        
        .blink { animation: blinker 0.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="lives-container">
        <span class="heart" id="h1">❤️</span>
        <span class="heart" id="h2">❤️</span>
        <span class="heart" id="h3">❤️</span>
    </div>

    <div id="level-announcement">
        <h2 class="lvl-text">¡NIVEL <span id="lvl-num">1</span>!</h2>
        <p id="lvl-title" class="lvl-name">CIUDAD NOCTURNA</p>
    </div>

    <div id="start-screen">
        <div class="max-w-md">
            <div class="text-8xl mb-6">🌃</div>
            <h1 class="text-4xl font-black mb-4 uppercase">Night Runner</h1>
            <p class="text-xl text-gray-400 mb-2">Récord Actual: <b id="high-score-start" class="text-white">0</b>m</p>
            <p class="text-gray-500 mb-4 uppercase text-xs tracking-widest">Pone el celular para que se te vea todo el cuerpo</p>
            <button id="btn-comenzar" class="btn-start">EMPEZAR</button>
        </div>
    </div>

    <div id="countdown-screen">
        <div id="countdown-number" class="text-[15rem] font-black text-white">5</div>
        <p class="text-2xl font-bold text-gray-400 uppercase tracking-widest">¡Prepárate!</p>
    </div>

    <div id="loading">
        <div class="text-6xl mb-4 animate-bounce">🏃</div>
        <h1 class="text-2xl font-bold">CARGANDO IA...</h1>
        <p class="text-gray-500">Ponte frente a la cámara</p>
    </div>

    <div id="game-over">
        <h2 class="text-6xl font-black mb-4">¡FIN DEL JUEGO!</h2>
        <p class="text-2xl mb-2">Distancia: <span id="final-dist">0</span>m</p>
        <p class="text-xl text-yellow-400 font-bold mb-8" id="new-record-msg" style="display:none">¡NUEVO RÉCORD PERSONAL!</p>
        <button onclick="location.reload()" class="bg-white text-black px-8 py-4 rounded-full font-bold text-xl hover:bg-gray-200 transition">REINTENTAR</button>
    </div>

    <div id="ui">
        <div class="flex gap-4">
            <div class="stat-card">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Distancia</p>
                <p class="text-4xl font-black"><span id="dist-val">0</span>m</p>
            </div>
            <div class="stat-card border-yellow-400">
                <p class="text-xs font-bold text-yellow-600 uppercase tracking-widest">Récord</p>
                <p class="text-4xl font-black"><span id="high-score-val">0</span>m</p>
            </div>
        </div>
    </div>

    <div id="video-container">
        <video id="video-preview" autoplay playsinline muted></video>
        <canvas id="skeleton-canvas"></canvas>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video-preview');
        const skeletonCanvas = document.getElementById('skeleton-canvas');
        const sctx = skeletonCanvas.getContext('2d');
        
        const distVal = document.getElementById('dist-val');
        const finalDist = document.getElementById('final-dist');
        const loading = document.getElementById('loading');
        const gameOver = document.getElementById('game-over');
        const startScreen = document.getElementById('start-screen');
        const countdownScreen = document.getElementById('countdown-screen');
        const countdownNumber = document.getElementById('countdown-number');
        const btnComenzar = document.getElementById('btn-comenzar');
        const ui = document.getElementById('ui');
        const highScoreVal = document.getElementById('high-score-val');
        const highScoreStart = document.getElementById('high-score-start');
        const newRecordMsg = document.getElementById('new-record-msg');
        const levelAnnounce = document.getElementById('level-announcement');
        const lvlNum = document.getElementById('lvl-num');
        const lvlTitle = document.getElementById('lvl-title');

        let isGameOver = false;
        let isGameStarted = false;
        let distance = 0;
        let speed = 0;
        let obstacles = [];
        let iaLoaded = false;
        let highScore = localStorage.getItem('runnerHighScore') || 0;

        // Vidas y Progreso
        let lives = 3;
        let isInvincible = false;
        let isKicking = false; 
        let isPunching = false; 
        let popups = []; // Textos flotantes (KICK/PUNCH)
        const progressBar = document.getElementById('progress-bar');

        // Niveles
        let currentLevel = 0;
        const levelData = [
            { 
                name: "CIUDAD NOCTURNA", 
                threshold: 0,
                sky: ["#020617", "#1e1b4b"],
                static: ["🚧", "🧱", "🚧", "🚧"],
                animals: ["🐕", "🐈", "🦖", "🐕"],
                ground: "#020617",
                roadLine: "#fbbf24"
            },
            { 
                name: "BOSQUE MÁGICO", 
                threshold: 1000,
                sky: ["#064e3b", "#022c22"],
                static: ["🪵", "🍄", "🪵", "🍄"],
                animals: ["🦌", "🐗", "🐒", "🦌"],
                ground: "#064e3b",
                roadLine: "#4ade80"
            },
            { 
                name: "DESIERTO ÁRIDO", 
                threshold: 2000,
                sky: ["#7c2d12", "#451a03"],
                static: ["🌵", "🪨", "🌵", "🪨"],
                animals: ["🐪", "🐍", "🦂", "🐪"],
                ground: "#7c2d12",
                roadLine: "#f97316"
            },
            { 
                name: "ESPACIO EXTERIOR", 
                threshold: 3000,
                sky: ["#000000", "#2e1065"],
                static: ["☄️", "🛰️", "☄️", "🛰️"],
                animals: ["👽", "🛸", "👾", "👽"],
                ground: "#000000",
                roadLine: "#a855f7"
            }
        ];

        // Elementos de Ambiente
        let clouds = [];
        let mountains = [];
        let buildings = [];
        let trees = [];
        let stars = [];
        let weather = []; // Partículas de clima
        let roadOffset = 0;

        const player = {
            x: 150,
            y: 0,
            vy: 0,
            size: 80,
            isJumping: false,
            groundY: 0
        };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.groundY = canvas.height * 0.75;
            player.y = player.groundY;
            
            highScoreVal.innerText = highScore;
            highScoreStart.innerText = highScore;

            initEnvironment();
        }

        function initEnvironment() {
            stars = Array.from({length: 100}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height * 0.5),
                size: Math.random() * 2
            }));

            clouds = Array.from({length: 5}, () => ({
                x: Math.random() * canvas.width,
                y: 50 + Math.random() * 100,
                speed: 0.1 + Math.random() * 0.3
            }));

            mountains = [
                {x: 0, speed: 0.05},
                {x: canvas.width * 0.6, speed: 0.05}
            ];

            buildings = Array.from({length: 10}, (_, i) => ({
                x: i * 200,
                width: 120 + Math.random() * 80,
                height: 150 + Math.random() * 250,
                speed: 0.15,
                windows: Array.from({length: 20}, () => ({
                    x: Math.random(),
                    y: Math.random(),
                    lit: Math.random() > 0.6
                }))
            }));

            trees = Array.from({length: 6}, (_, i) => ({
                x: i * 400 + Math.random() * 200,
                speed: 0.4
            }));

            weather = Array.from({length: 80}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: 1 + Math.random() * 3,
                speed: 5 + Math.random() * 10
            }));
        }

        function triggerKick() {
            isKicking = true;
            addPopup("¡KICK!", "#ff4444");
            setTimeout(() => {
                isKicking = false;
            }, 600);
        }

        function triggerPunch() {
            isPunching = true;
            addPopup("¡PUNCH!", "#4444ff");
            setTimeout(() => {
                isPunching = false;
            }, 600);
        }

        function addPopup(text, color) {
            popups.push({
                x: player.x,
                y: player.y - 60,
                text: text,
                color: color,
                opacity: 1,
                life: 1.0
            });
        }

        function checkLevel() {
            const nextLevel = levelData[currentLevel + 1];
            if (nextLevel && distance >= nextLevel.threshold) {
                currentLevel++;
                showLevelAnnounce();
            }
        }

        function showLevelAnnounce() {
            levelAnnounce.style.display = 'block';
            lvlNum.innerText = currentLevel + 1;
            lvlTitle.innerText = levelData[currentLevel].name;
            
            setTimeout(() => {
                levelAnnounce.style.display = 'none';
            }, 3000);
        }
        
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        function drawSkeleton(landmarks) {
            skeletonCanvas.width = video.videoWidth;
            skeletonCanvas.height = video.videoHeight;
            sctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
            
            sctx.fillStyle = "#00FF00";
            sctx.strokeStyle = "#00FF00";
            sctx.lineWidth = 2;

            // Dibujar puntos clave
            const points = [11, 12, 15, 16, 23, 24, 25, 26, 27, 28];
            points.forEach(idx => {
                const lm = landmarks[idx];
                sctx.beginPath();
                sctx.arc(lm.x * skeletonCanvas.width, lm.y * skeletonCanvas.height, 4, 0, 2 * Math.PI);
                sctx.fill();
            });
        }
        
        function drawBackground() {
            const lvl = levelData[currentLevel];
            
            // Cielo Dinámico
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, lvl.sky[0]);
            gradient.addColorStop(1, lvl.sky[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrellas (Solo en Noche y Espacio)
            if (currentLevel === 0 || currentLevel === 3) {
                ctx.fillStyle = "#fff";
                stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fill();
                });
            }

            // Luna o Sol según nivel
            ctx.font = '80px Arial';
            if (currentLevel === 3) ctx.fillText("🪐", canvas.width - 200, 150);
            else if (currentLevel === 2) ctx.fillText("☀️", canvas.width - 150, 100);
            else ctx.fillText("🌕", canvas.width - 150, 100);

            // Montañas
            ctx.fillStyle = lvl.ground;
            ctx.globalAlpha = 0.3;
            mountains.forEach(mtn => {
                ctx.beginPath();
                ctx.moveTo(mtn.x, player.groundY + 40);
                ctx.lineTo(mtn.x + 400, player.groundY - 150);
                ctx.lineTo(mtn.x + 800, player.groundY + 40);
                ctx.fill();
                mtn.x -= (speed * mtn.speed);
                if (mtn.x < -800) mtn.x = canvas.width;
            });
            ctx.globalAlpha = 1.0;

            // Edificios (Solo nivel 1)
            if (currentLevel === 0) {
                buildings.forEach(b => {
                    ctx.fillStyle = "#1e293b";
                    ctx.fillRect(b.x, player.groundY + 40 - b.height, b.width, b.height);
                    ctx.fillStyle = "#facc15";
                    b.windows.forEach(w => {
                        if (w.lit) ctx.fillRect(b.x + (w.x * (b.width - 10)), (player.groundY + 40 - b.height) + (w.y * (b.height - 10)), 5, 8);
                    });
                    b.x -= (speed * b.speed);
                    if (b.x < -b.width) b.x = canvas.width;
                });
            }

            // Nubes
            ctx.font = '40px Arial';
            clouds.forEach(cloud => {
                ctx.fillText(currentLevel === 3 ? "☄️" : "☁️", cloud.x, cloud.y);
                cloud.x -= (speed * 0.1 + cloud.speed);
                if (cloud.x < -100) cloud.x = canvas.width + 100;
            });

            // Árboles o Pinos según nivel
            ctx.font = '60px Arial';
            trees.forEach(t => {
                let decor = "🌳";
                if (currentLevel === 1) decor = "🌲";
                if (currentLevel === 2) decor = "🌵";
                if (currentLevel === 3) decor = "🛰️";
                
                ctx.fillText(decor, t.x, player.groundY + 40);
                t.x -= (speed * t.speed);
                if (t.x < -100) t.x = canvas.width + 100;
            });

            // CLIMA
            drawWeather();

            // Calle
            ctx.fillStyle = lvl.ground;
            ctx.fillRect(0, player.groundY + 40, canvas.width, canvas.height - (player.groundY + 40));
            
            ctx.strokeStyle = lvl.roadLine;
            ctx.setLineDash([40, 40]);
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, player.groundY + 120);
            ctx.lineTo(canvas.width, player.groundY + 120);
            ctx.lineDashOffset = -roadOffset;
            ctx.stroke();
            ctx.setLineDash([]);
            
            roadOffset += speed;
        }

        function drawWeather() {
            if (currentLevel === 0) return; // Ciudad despejada

            weather.forEach(p => {
                if (currentLevel === 1) { // LLUVIA (Bosque)
                    ctx.strokeStyle = "rgba(173, 216, 230, 0.4)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - 10, p.y + 20);
                    ctx.stroke();
                    p.y += p.speed;
                    p.x -= p.speed * 0.2;
                } 
                else if (currentLevel === 2) { // TORMENTA DE ARENA (Desierto)
                    ctx.fillStyle = "rgba(194, 120, 50, 0.3)";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    p.x -= (p.speed + speed);
                }
                else if (currentLevel === 3) { // POLVO CÓSMICO (Espacio)
                    ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    p.x -= (p.speed * 0.1 + speed * 0.05);
                }

                // Reset partículas
                if (p.y > canvas.height) p.y = -20;
                if (p.x < -20) p.x = canvas.width + 20;
                if (p.x > canvas.width + 20) p.x = -20;
            });
        }

        let lastAnkleY = 0;
        let lastShoulderY = 0;
        let canJump = true;
        let smoothedDelta = 0; // Para el filtro pasa-bajo

        pose.onResults((results) => {
            if (!iaLoaded && results.poseLandmarks) {
                iaLoaded = true;
                loading.style.display = 'none';
                startCountdown();
            }

            if (results.poseLandmarks) {
                drawSkeleton(results.poseLandmarks);
                
                if (isGameStarted && !isGameOver) {
                    const landmarks = results.poseLandmarks;
                
                    // 1. DETECTAR MOVIMIENTO COMBINADO (Pies y Hombros)
                    const leftAnkle = landmarks[27];
                    const rightAnkle = landmarks[28];
                    const currentAnkleY = (leftAnkle.y + rightAnkle.y) / 2;

                    const leftShoulder = landmarks[11];
                    const rightShoulder = landmarks[12];
                    const currentShoulderY = (leftShoulder.y + rightShoulder.y) / 2;

                    let rawDelta = 0;

                    // Delta de pies
                    if (lastAnkleY !== 0) {
                        rawDelta += Math.abs(currentAnkleY - lastAnkleY) * 1.5;
                    }
                    // Delta de hombros (trote)
                    if (lastShoulderY !== 0) {
                        rawDelta += Math.abs(currentShoulderY - lastShoulderY) * 1.2;
                    }

                    // FILTRO PASA-BAJO (Suaviza el ruido de la cámara)
                    // Promediamos el 80% del valor anterior con el 20% del nuevo
                    smoothedDelta = (smoothedDelta * 0.8) + (rawDelta * 0.2);

                    // Filtro de ruido y sensibilidad mejorado
                    if (smoothedDelta > 0.009) { // Umbral aumentado para seguridad
                        speed = Math.min(speed + smoothedDelta * 10, 12);
                    } else {
                        speed *= 0.75; // Frenado más agresivo
                        if (speed < 0.1) speed = 0;
                        smoothedDelta = 0; // Resetear filtro al estar quieto
                    }

                    lastAnkleY = currentAnkleY;
                    lastShoulderY = currentShoulderY;

                    // 2. DETECTAR SALTO (Compresión Hombros-Rodillas)
                    const kneeY = (landmarks[25].y + landmarks[26].y) / 2;
                    const compression = kneeY - currentShoulderY;

                    // Salto más sensible
                    if (compression < 0.28 && canJump && !player.isJumping) {
                        player.vy = -20;
                        player.isJumping = true;
                        canJump = false;
                    }
                    if (compression > 0.32) {
                        canJump = true;
                    }
                }
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => {
                await pose.send({image: video});
            },
            width: 640,
            height: 480
        });

        // FLUJO DE INICIO
        btnComenzar.onclick = async () => {
            startScreen.style.display = 'none';
            loading.style.display = 'flex';
            try {
                await camera.start();
                video.play(); // Forzar reproducción en móviles
            } catch (err) {
                console.error("Error al iniciar cámara:", err);
                alert("No se pudo acceder a la cámara. Por favor, asegúrate de dar los permisos.");
            }
        };

        function startCountdown() {
            countdownScreen.style.display = 'flex';
            let count = 5;
            countdownNumber.innerText = count;
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.innerText = count;
                } else {
                    clearInterval(timer);
                    countdownScreen.style.display = 'none';
                    ui.style.display = 'block';
                    isGameStarted = true;
                }
            }, 1000);
        }

        // LOGICA DEL JUEGO
        function update() {
            if (isGameOver || !isGameStarted) return;

            checkLevel();

            // Actualizar Popups
            popups.forEach((p, i) => {
                p.y -= 2;
                p.life -= 0.02;
                if (p.life <= 0) popups.splice(i, 1);
            });

            // Gravedad
            if (player.isJumping) {
                player.y += player.vy;
                player.vy += 0.8; 
                if (player.y >= player.groundY) {
                    player.y = player.groundY;
                    player.isJumping = false;
                    player.vy = 0;
                }
            }

            // Distancia
            if (speed > 0.2) {
                distance += speed * 0.05;
                distVal.innerText = Math.floor(distance);
                updateProgressBar();
            }

            // Generar Obstáculos dinámicos por nivel
            if (Math.random() < 0.015 && isGameStarted) {
                const lvl = levelData[currentLevel];
                const isAnimal = Math.random() < 0.4;
                
                // Los animales corren más rápido en niveles altos
                const levelSpeedBoost = 1 + (currentLevel * 0.4); // +40% por nivel
                
                obstacles.push({
                    x: canvas.width,
                    y: player.groundY,
                    emoji: isAnimal ? lvl.animals[Math.floor(Math.random() * lvl.animals.length)] : lvl.static[Math.floor(Math.random() * lvl.static.length)],
                    isAnimal: isAnimal,
                    baseSpeed: isAnimal ? (2 + Math.random() * 3) * levelSpeedBoost : 0
                });
            }

            obstacles.forEach((obs, index) => {
                const moveSpeed = obs.isAnimal ? (speed + obs.baseSpeed) : speed;
                obs.x -= moveSpeed;

                const dx = obs.x - player.x;
                const dy = obs.y - player.y;
                const collisionDist = Math.sqrt(dx*dx + dy*dy);

                if (collisionDist < 50 && !isInvincible) {
                    loseLife();
                }
                if (obs.x < -100) obstacles.splice(index, 1);
            });
        }

        function updateProgressBar() {
            const currentLvl = levelData[currentLevel];
            const nextLvl = levelData[currentLevel + 1];
            if (!nextLvl) {
                progressBar.style.width = "100%";
                return;
            }
            const range = nextLvl.threshold - currentLvl.threshold;
            const progress = ((distance - currentLvl.threshold) / range) * 100;
            progressBar.style.width = Math.min(progress, 100) + "%";
        }

        function loseLife() {
            lives--;
            document.getElementById(`h${lives + 1}`).style.opacity = "0.2";
            
            if (lives <= 0) {
                endGame();
            } else {
                triggerInvincibility();
            }
        }

        function triggerInvincibility() {
            isInvincible = true;
            setTimeout(() => {
                isInvincible = false;
            }, 2000);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            // Dibujar Obstáculos
            ctx.font = '50px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            obstacles.forEach(obs => {
                ctx.fillText(obs.emoji, obs.x, obs.y);
            });

            // Dibujar Jugador (Con parpadeo si es invencible)
            let showPlayer = true;
            if (isInvincible && Math.floor(Date.now() / 150) % 2 === 0) {
                showPlayer = false;
            }

            if (showPlayer) {
                ctx.font = '80px Arial';
                let charEmoji = currentLevel === 3 ? "👨‍🚀" : "🏃";
                if (isPunching) charEmoji = "👊";
                else if (isKicking) charEmoji = "🦶";
                ctx.fillText(charEmoji, player.x, player.y);
            }

            // Dibujar Popups (¡KICK! / ¡PUNCH!)
            popups.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.font = 'bold 40px Arial';
                ctx.fillText(p.text, p.x, p.y);
                ctx.globalAlpha = 1.0;
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function endGame() {
            isGameOver = true;
            const currentDist = Math.floor(distance);
            finalDist.innerText = currentDist;
            
            if (currentDist > highScore) {
                highScore = currentDist;
                localStorage.setItem('runnerHighScore', highScore);
                newRecordMsg.style.display = 'block';
            }
            
            gameOver.style.display = 'flex';
        }

        window.addEventListener('resize', init);
        init();
        draw();

    </script>
</body>
</html>
